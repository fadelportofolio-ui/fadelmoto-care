<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FADELAUTOCARE | V10 Pro Mechanic</title>
    
    <meta name="theme-color" content="#ea580c">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22FadelAutoCare%22,%22short_name%22:%22AutoCare%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#ea580c%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/1048/1048329.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]} ">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .bar-container { height: 8px; background: #f1f5f9; border-radius: 20px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s ease-in-out; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <div class="fixed bottom-6 right-6 z-[100]">
        <button onclick="toggleEmergency()" class="pulse-red bg-red-600 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center border-4 border-white transition-transform active:scale-90">
            <i class="fa-solid fa-truck-pickup text-2xl"></i>
        </button>
    </div>

    <div id="emergencyModal" class="hidden fixed inset-0 bg-slate-900/95 z-[110] backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl fade-in text-center">
            <div class="bg-red-600 p-8 text-white">
                <i class="fa-solid fa-truck-moving text-5xl mb-3"></i>
                <h2 class="text-xl font-black uppercase italic">Derek Darurat</h2>
                <p class="text-[10px] uppercase font-bold opacity-80 tracking-widest">Layanan Towing 24 Jam</p>
            </div>
            <div class="p-6">
                <button onclick="panggilDerek()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest mb-3 hover:bg-red-600 transition-colors">Cari di Google Maps</button>
                <button onclick="toggleEmergency()" class="text-slate-400 font-bold text-[10px] uppercase">Batalkan</button>
            </div>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-200 py-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-orange-600 uppercase">FADEL<span class="text-slate-900 italic">AUTOCARE</span></h1>
            <div id="installApp" class="hidden bg-slate-900 text-white px-4 py-1.5 rounded-full text-[9px] font-black uppercase cursor-pointer hover:bg-orange-600 transition-colors">Install App</div>
        </div>
    </nav>

    <main class="container mx-auto px-4 mt-6 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h2 class="text-lg font-black mb-6 uppercase italic flex items-center gap-2">
                        <i class="fa-solid fa-screwdriver-wrench text-orange-600"></i> Servis Berkala
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Jenis Kendaraan</label>
                            <select id="mainCat" onchange="updateSubTypes()" class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-orange-500">
                                <option value="motor">🏍️ Sepeda Motor</option>
                                <option value="mobil">🚗 Mobil</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tipe Unit</label>
                            <select id="subType" class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-orange-500"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">KM Sekarang</label>
                                <input type="number" id="currKm" placeholder="0" class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">KM Terakhir</label>
                                <input type="number" id="lastKm" placeholder="0" class="w-full mt-1 p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none">
                            </div>
                        </div>
                        <button onclick="prosesDiagnosa()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-orange-600 shadow-lg transition-all active:scale-95 shadow-orange-100">
                            MULAI SCAN KOMPONEN
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 opacity-5 text-8xl"><i class="fa-solid fa-history"></i></div>
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] mb-4 text-orange-400 italic">History Log</h3>
                    <div id="historyLog" class="space-y-3 max-h-40 overflow-y-auto relative z-10 pr-2 custom-scroll"></div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div id="urgentBox" class="hidden fade-in bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-red-100 p-8">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="bg-red-100 p-3 rounded-2xl text-red-600"><i class="fa-solid fa-triangle-exclamation text-2xl"></i></div>
                        <div>
                            <h3 class="font-black uppercase italic text-red-600 leading-none">Daftar Komponen Kritis</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Lakukan penggantian segera di bengkel terdekat</p>
                        </div>
                    </div>
                    <div id="urgentList" class="flex flex-wrap gap-2 mb-6"></div>
                    <div class="rounded-[2rem] overflow-hidden border-4 border-slate-50 h-72 shadow-inner">
                        <iframe id="gmap" width="100%" height="100%" frameborder="0"></iframe>
                    </div>
                </div>
                <div id="resultGrid" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        // Logika JavaScript tetap sama seperti versi sebelumnya
        let userLat = null, userLng = null;

        const db = {
            motor: {
                matic_small: [
                    {n:"Oli Mesin", i:2000, ic:"fa-droplet"},
                    {n:"Oli Gardan", i:8000, ic:"fa-oil-can"},
                    {n:"V-Belt", i:12000, ic:"fa-circle-notch"},
                    {n:"Roller", i:12000, ic:"fa-dharmachakra"},
                    {n:"Filter Udara", i:12000, ic:"fa-wind"},
                    {n:"Kampas Rem Depan", i:10000, ic:"fa-circle-stop"},
                    {n:"Kampas Rem Belakang", i:12000, ic:"fa-circle-stop"},
                    {n:"Busi", i:8000, ic:"fa-bolt"},
                    {n:"Minyak Rem", i:20000, ic:"fa-bottle-droplet"},
                    {n:"Ban Depan", i:15000, ic:"fa-circle-dot"},
                    {n:"Ban Belakang", i:12000, ic:"fa-circle-dot"}
                ],
                matic_big: [
                    {n:"Oli Mesin (High Grade)", i:4000, ic:"fa-droplet"},
                    {n:"Oli Gardan", i:10000, ic:"fa-oil-can"},
                    {n:"V-Belt & Roller", i:15000, ic:"fa-circle-notch"},
                    {n:"Filter Oli", i:10000, ic:"fa-filter"},
                    {n:"Air Radiator", i:12000, ic:"fa-temperature-low"},
                    {n:"Kampas Rem ABS", i:12000, ic:"fa-circle-stop"},
                    {n:"Busi Iridium", i:15000, ic:"fa-bolt"},
                    {n:"Filter Udara", i:12000, ic:"fa-wind"}
                ],
                sport: [
                    {n:"Oli Mesin", i:2500, ic:"fa-droplet"},
                    {n:"Filter Oli", i:10000, ic:"fa-filter"},
                    {n:"Rantai & Gear Set", i:15000, ic:"fa-link"},
                    {n:"Air Radiator", i:12000, ic:"fa-temperature-low"},
                    {n:"Kampas Rem Depan", i:10000, ic:"fa-circle-stop"},
                    {n:"Busi", i:8000, ic:"fa-bolt"},
                    {n:"Kabel Kopling", i:15000, ic:"fa-lines-leaning"}
                ],
                bebek: [
                    {n:"Oli Mesin", i:2500, ic:"fa-droplet"},
                    {n:"Rantai Roda", i:10000, ic:"fa-link"},
                    {n:"Kampas Kopling", i:25000, ic:"fa-compact-disc"},
                    {n:"Busi", i:8000, ic:"fa-bolt"},
                    {n:"Kampas Rem", i:12000, ic:"fa-circle-stop"}
                ]
            },
            mobil: {
                bensin: [
                    {n:"Oli Mesin", i:10000, ic:"fa-droplet"},
                    {n:"Filter Oli", i:10000, ic:"fa-filter"},
                    {n:"Filter Udara", i:20000, ic:"fa-wind"},
                    {n:"Filter Kabin (AC)", i:10000, ic:"fa-fan"},
                    {n:"Busi", i:40000, ic:"fa-bolt"},
                    {n:"Minyak Rem", i:40000, ic:"fa-bottle-droplet"},
                    {n:"Vanbelt (V-Belt)", i:40000, ic:"fa-ring"},
                    {n:"Air Radiator", i:40000, ic:"fa-temperature-low"},
                    {n:"Kampas Rem Depan", i:30000, ic:"fa-circle-stop"}
                ],
                diesel: [
                    {n:"Oli Mesin Diesel", i:5000, ic:"fa-droplet"},
                    {n:"Filter Oli", i:5000, ic:"fa-filter"},
                    {n:"Filter Solar (BBM)", i:10000, ic:"fa-gas-pump"},
                    {n:"Filter Udara", i:20000, ic:"fa-wind"},
                    {n:"Oli Transmisi", i:40000, ic:"fa-gears"},
                    {n:"Oli Gardan", i:40000, ic:"fa-oil-can"}
                ]
            }
        };

        function updateSubTypes() {
            const main = document.getElementById('mainCat').value;
            const sub = document.getElementById('subType');
            sub.innerHTML = main === 'motor' 
                ? `<option value="matic_small">Matic 110-125cc (Beat, Vario, Mio, Scoopy)</option>
                   <option value="matic_big">Matic 150-250cc (NMAX, PCX, XMAX, ADV)</option>
                   <option value="sport">Motor Sport (CBR, R15, Ninja, Vixion)</option>
                   <option value="bebek">Motor Bebek (Supra, Jupiter, Revo)</option>`
                : `<option value="bensin">Mobil Bensin (Avanza, Xpander, Brio, Civic)</option>
                   <option value="diesel">Mobil Diesel (Innova, Pajero, Fortuner)</option>`;
        }

        function prosesDiagnosa() {
            const curr = parseInt(document.getElementById('currKm').value);
            const last = parseInt(document.getElementById('lastKm').value) || 0;
            const main = document.getElementById('mainCat').value;
            const sub = document.getElementById('subType').value;

            if (isNaN(curr) || curr < last) return alert("KM Tidak Valid!");

            const grid = document.getElementById('resultGrid');
            const uBox = document.getElementById('urgentBox');
            const uList = document.getElementById('urgentList');
            const history = document.getElementById('historyLog');
            
            grid.innerHTML = ""; uList.innerHTML = ""; grid.classList.remove('hidden');

            let uCount = 0;
            db[main][sub].forEach(p => {
                const sisa = Math.max(0, p.i - (curr - last));
                const pct = (sisa / p.i) * 100;
                let bg = pct <= 20 ? "bg-red-600" : (pct <= 50 ? "bg-orange-500" : "bg-emerald-500");
                let textCol = pct <= 20 ? "text-red-600" : "text-slate-500";
                
                if(pct <= 20) {
                    uCount++;
                    uList.innerHTML += `<span class="px-4 py-1.5 bg-red-600 text-white text-[10px] font-black rounded-xl uppercase tracking-tighter shadow-lg shadow-red-200">${p.n}</span>`;
                }

                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm fade-in hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-4">
                            <div class="bg-slate-50 p-3 rounded-2xl text-slate-400"><i class="fa-solid ${p.ic} text-lg"></i></div>
                            <span class="text-[8px] font-black uppercase px-2 py-1 rounded-lg ${pct <= 20 ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-400'}">
                                ${pct <= 20 ? 'Ganti' : 'Oke'}
                            </span>
                        </div>
                        <h4 class="font-black text-slate-800 text-xs uppercase leading-tight">${p.n}</h4>
                        <p class="text-[10px] font-bold mt-1 ${textCol}">${sisa.toLocaleString()} KM Lagi</p>
                        <div class="bar-container mt-4"><div class="bar-fill ${bg}" style="width: ${pct}%"></div></div>
                    </div>`;
            });

            history.innerHTML = `
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mb-2 fade-in">
                    <p class="text-[10px] font-black uppercase text-orange-400">${sub.replace('_', ' ')}</p>
                    <p class="text-[9px] font-bold text-slate-400">${curr.toLocaleString()} KM • ${new Date().toLocaleTimeString()}</p>
                </div>` + history.innerHTML;

            if (uCount > 0) {
                uBox.classList.remove('hidden');
                const query = main === 'motor' ? 'Bengkel+Motor+Terdekat' : 'Bengkel+Mobil+Terdekat';
                document.getElementById('gmap').src = `https://maps.google.com/maps?q=${query}&output=embed`;
                uBox.scrollIntoView({ behavior: 'smooth' });
            } else {
                uBox.classList.add('hidden');
            }
        }

        function toggleEmergency() { document.getElementById('emergencyModal').classList.toggle('hidden'); }
        function panggilDerek() { 
            const q = "Derek+Towing+24+Jam+Terdekat";
            window.open(userLat ? `https://www.google.com/maps/search/${q}/@${userLat},${userLng},15z` : `https://www.google.com/maps/search/${q}`, '_blank');
        }

        window.onload = () => {
            updateSubTypes();
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    userLat = pos.coords.latitude; userLng = pos.coords.longitude;
                }, null, { enableHighAccuracy: true });
            }
        };

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installApp').classList.remove('hidden');
        });
        document.getElementById('installApp').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installApp').classList.add('hidden');
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
